<!doctype html>
<html lang="ja" data-theme="light">

<head>

    <link rel="icon" type="image/svg+xml" href="{{ url_for('assets', path='/favicon.svg') }}">
    <title>{% block title %}Chat{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('assets', path='/css/app.css') }}">

<body>

</html>
