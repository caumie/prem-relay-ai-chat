<div id="messages" class="messageList">
    {% include "message_items.html" %}
    <style>
  @scope {
    :scope {
        display: flex;
        flex-direction: column;
        gap: .75rem;
        margin-bottom: 1rem;
    }

    .messageItem {
        display: flex;
    }

    .messageItem:last-of-type {
        margin-bottom: 12rem;
    }

    .userMessage {
        justify-content: flex-end;
    }

    .assistantMessage {
        justify-content: flex-start;
    }

    .messageContent {
        display: flex;
        flex-direction: column;
        max-width: min(100%, 46rem);
    }

    .userMessage .messageContent {
        align-items: flex-end;
    }

    .messageBubble {
        display: inline-block;
        width: fit-content;
        max-width: 100%;
        padding: .75rem 1rem;
        border-radius: var(--radius-md);
        background: var(--bg-message-assistant);
        color: var(--text-message-assistant);
        overflow-wrap: anywhere;
    }

    .userMessage .messageBubble {
        background: var(--bg-message-user);
        color: var(--text-message-user);
    }

    .streaming .messageBubble {
        opacity: .75;
    }

    .messageReasoning {
        margin-bottom: .5rem;
        border-radius: var(--radius-md);
        background: var(--bg-message-assistant);
        color: var(--text-message-assistant);
        opacity: .85;
        overflow-wrap: anywhere;
    }

    .messageReasoning summary {
        padding: .5rem 1rem;
        cursor: pointer;
        font-size: .8rem;
        color: var(--text-muted);
    }

    .messageReasoning[open] summary {
        padding-bottom: .25rem;
    }

    .messageReasoning [data-chat-message-reasoning-body] {
        padding: 0 1rem .75rem;
    }

    .messageAttachments {
        margin-top: .45rem;
        display: flex;
        flex-direction: column;
        gap: .45rem;
    }

    .userMessage .messageAttachments {
        align-items: flex-end;
    }

    .messageAttachment {
        display: inline-grid;
        grid-template-columns: auto minmax(0, 1fr);
        grid-template-areas:
            "preview name"
            "preview meta";
        align-items: center;
        column-gap: .65rem;
        max-width: min(100%, 24rem);
        padding: .5rem;
        border: 1px solid var(--border-subtle);
        border-radius: var(--radius-md);
        background: var(--bg-message-assistant);
        color: var(--text-message-assistant);
    }

    .userMessage .messageAttachment {
        background: var(--bg-message-user);
        color: var(--text-message-user);
        border-color: rgba(255, 255, 255, .35);
    }

    .userMessage .messageBubble {
        margin-left: auto;
    }

    .messageAttachmentImage,
    .messageAttachmentIcon {
        grid-area: preview;
        width: 4rem;
        height: 4rem;
        border-radius: .45rem;
        object-fit: cover;
        background: rgba(0, 0, 0, .08);
    }

    .messageAttachmentIcon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .messageAttachmentName {
        grid-area: name;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 600;
    }

    .messageAttachmentMeta {
        grid-area: meta;
        color: var(--text-muted);
        font-size: .78rem;
    }

    .userMessage .messageAttachmentMeta {
        color: var(--text-message-user);
        opacity: .92;
    }

    .messageBubble p,
    .messageReasoning p {
        margin: 0 0 .75rem;
    }

    .messageBubble p:last-child,
    .messageReasoning p:last-child {
        margin-bottom: 0;
    }

    .messageBubble pre,
    .messageReasoning pre {
        overflow-x: auto;
        padding: .75rem;
        border-radius: .5rem;
        background: rgba(0, 0, 0, .1);
    }

    .messageMeta {
        margin-top: .2rem;
        display: flex;
        align-items: center;
        gap: .5rem;
        font-size: .75rem;
        color: var(--text-muted);
    }

    .messageAssistantName {
        font-size: .68rem;
        opacity: .82;
    }

    .copyButton {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.8rem;
        height: 1.8rem;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: inherit;
        cursor: pointer;
    }

    .copyButton:hover {
        background: rgba(0, 0, 0, .08);
    }
  }
    </style>
</div>
